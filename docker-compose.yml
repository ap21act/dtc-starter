services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: medusa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medusa-store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medusa_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medusa-store"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis
  redis:
    image: redis:7-alpine
    container_name: medusa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - medusa_network

  # Medusa Server
  # This service runs the Medusa backend application
  # and the admin dashboard.
  medusa:
    build: .
    container_name: medusa_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "9000:9000"
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/medusa-store
      - REDIS_URL=redis://redis:6379
    env_file:
      - apps/backend/.env
    volumes:
      - .:/server
      - /server/node_modules
      - /server/apps/backend/node_modules
    networks:
      - medusa_network

  # Storefront
  # This service runs the Next.js Starter Storefront
  storefront:
    build: .
    container_name: medusa_storefront
    restart: unless-stopped
    depends_on:
      - medusa
    ports:
      - "8000:8000"
    environment:
      - NEXT_PUBLIC_MEDUSA_BACKEND_URL=http://medusa:9000
    env_file:
      - apps/storefront/.env
    volumes:
      - .:/server
      - /server/node_modules
      - /server/apps/backend/node_modules
      - /server/apps/storefront/node_modules
      - /server/apps/storefront/.next
    entrypoint: ["./start-storefront.sh"]
    networks:
      - medusa_network

  # Product Sync Service
  # Runs immediately on startup then every hour.
  # TIMCO: complete. FTP supplier: wired up once Excel docs are shared.
  sync:
    build: .
    container_name: medusa_sync
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      medusa:
        condition: service_started
    environment:
      - TIMCO_BASE_URL=https://timcoproductapi.azurewebsites.net
      - TIMCO_USERNAME=${TIMCO_USERNAME}
      - TIMCO_PASSWORD=${TIMCO_PASSWORD}
      - TIMCO_MARKUP_MULTIPLIER=${TIMCO_MARKUP_MULTIPLIER:-1.4}
      - FTP_HOST=${FTP_HOST}
      - FTP_USERNAME=${FTP_USERNAME}
      - FTP_PASSWORD=${FTP_PASSWORD}
      - MEDUSA_BACKEND_URL=http://medusa:9000
      - MEDUSA_ADMIN_EMAIL=${MEDUSA_ADMIN_EMAIL}
      - MEDUSA_ADMIN_PASSWORD=${MEDUSA_ADMIN_PASSWORD}
      - SYNC_STATE_PATH=/server/data/sync-state.json
    volumes:
      - .:/server
      - /server/node_modules
      - /server/apps/sync/node_modules
      - sync_data:/server/data
    entrypoint: ["./start-sync.sh"]
    networks:
      - medusa_network

volumes:
  postgres_data:
  sync_data:

networks:
  medusa_network:
    driver: bridge